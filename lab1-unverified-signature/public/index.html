<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 1: JWT Unverified Signature - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: #111111;
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .lab-badge {
            background: #e94560;
            color: white;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
            color: #fff;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #aaa;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 15px;
            border: 1px solid #0f3460;
            border-radius: 4px;
            background: #0a0a0a;
            color: #fff;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #e94560;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #c73a52;
        }

        .error {
            color: #e94560;
            font-size: 13px;
            margin-bottom: 10px;
            display: none;
        }

        .info-box {
            background: #0a0a0a;
            border: 1px solid #0f3460;
            border-radius: 4px;
            padding: 12px;
            margin-top: 20px;
            font-size: 13px;
        }

        .info-box code {
            color: #e94560;
            background: #0f3460;
            padding: 2px 6px;
            border-radius: 3px;
        }
    </style>
</head>

<body>
    <div class="container">
        <span class="lab-badge">LAB 1</span>
        <h1>JWT Unverified Signature</h1>
        <p class="subtitle">Authentication Bypass via Unverified Signature</p>

        <form id="loginForm">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter username" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>

            <div class="error" id="errorMsg"></div>
            <button type="submit">Login</button>
        </form>

        <div class="info-box" id="credsBox" style="display: none;">
            <strong>Lab Credentials (from .env):</strong><br>
            Username: <code id="demoUser">...</code><br>
            Password: <code id="demoPass">...</code>
        </div>
    </div>

    <script>
        fetch('/api/credentials').then(r => r.json()).then(data => {
            document.getElementById('demoUser').textContent = data.username;
            document.getElementById('demoPass').textContent = data.password;
            document.getElementById('credsBox').style.display = 'block';
        }).catch(console.error);

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    errorMsg.textContent = data.message;
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Connection error.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
